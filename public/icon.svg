<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="felt" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a3a2e"/>
      <stop offset="50%" stop-color="#0d1f18"/>
      <stop offset="100%" stop-color="#050a08"/>
    </radialGradient>
    <radialGradient id="lamp" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#ffc864" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffc864" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a1818"/>
      <stop offset="100%" stop-color="#4a0e0e"/>
    </linearGradient>
    <linearGradient id="cardFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark green felt background + warm amber lamp glow -->
  <rect width="512" height="512" fill="url(#felt)"/>
  <rect width="512" height="512" fill="url(#lamp)"/>

  <!-- Back card (red, tilted left) -->
  <g transform="rotate(-8 256 256)" filter="url(#glow)">
    <rect x="176" y="144" width="160" height="224" rx="14" ry="14"
          fill="url(#cardBack)" stroke="#fbbf24" stroke-opacity="0.5" stroke-width="2"/>
    <rect x="186" y="154" width="140" height="204" rx="8" ry="8"
          fill="none" stroke="#fbbf24" stroke-opacity="0.3" stroke-width="1.5"/>
  </g>

  <!-- Front card (cream/amber, tilted right) -->
  <g transform="rotate(8 256 256)" filter="url(#glow)">
    <rect x="176" y="144" width="160" height="224" rx="14" ry="14"
          fill="url(#cardFront)" stroke="#92400e" stroke-width="2"/>
    <!-- Simple spade silhouette as the card face -->
    <path d="M 256 220
             C 226 220, 210 246, 226 268
             C 234 280, 252 286, 256 296
             C 260 286, 278 280, 286 268
             C 302 246, 286 220, 256 220 Z
             M 248 296 L 248 312 L 264 312 L 264 296 Z"
          fill="#1c1917"/>
  </g>
</svg>
